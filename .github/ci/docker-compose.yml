# NSELF-FIRST EXCEPTION: cli-internal-template
# CI-only nself backend stack for admin E2E tests.
# Provides the postgres + hasura + auth services that admin API routes talk to.
# NOT generated by nself build -- this is a standalone CI fixture.
# All secrets are dev-only values intentionally weak for CI isolation.

name: nself-admin-ci

networks:
  admin_network:
    name: admin_network
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - admin_network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-dev-password
      POSTGRES_DB: nself_admin_ci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.36.0
    restart: unless-stopped
    networks:
      - admin_network
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'false'
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup
      HASURA_GRAPHQL_LOG_LEVEL: warn
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/healthz || exit 1']
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  auth:
    image: nhost/hasura-auth:0.36.0
    restart: unless-stopped
    networks:
      - admin_network
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
    environment:
      AUTH_HOST: '0.0.0.0'
      AUTH_PORT: '4000'
      # Database connection -- hasura-auth requires all of these forms to connect
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      AUTH_DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      PGHOST: postgres
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres-dev-password
      PGDATABASE: nself_admin_ci
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-dev-password
      POSTGRES_DATABASE: nself_admin_ci
      # Hasura connection -- admin secret and GraphQL endpoint
      HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}'
      HASURA_GRAPHQL_GRAPHQL_URL: http://hasura:8080/v1/graphql
      # JWT -- must match Hasura JWT secret key exactly
      AUTH_JWT_SECRET: admin-ci-development-secret-key-minimum-32-characters
      AUTH_JWT_KEY: admin-ci-development-secret-key-minimum-32-characters
      AUTH_JWT_TYPE: HS256
      # Server URLs
      AUTH_SERVER_URL: http://localhost:4000
      AUTH_CLIENT_URL: http://localhost:3021
      # Token expiry
      AUTH_ACCESS_TOKEN_EXPIRES_IN: '900'
      AUTH_REFRESH_TOKEN_EXPIRES_IN: '2592000'
      # Email -- verification not required in CI; SMTP dummy so auth does not crash on init
      AUTH_EMAIL_SIGNIN_EMAIL_VERIFIED_REQUIRED: 'false'
      AUTH_DISABLE_NEW_USERS: 'false'
      AUTH_ANONYMOUS_USERS_ENABLED: 'false'
      AUTH_SMTP_HOST: localhost
      AUTH_SMTP_PORT: '1025'
      AUTH_SMTP_SECURE: 'false'
      AUTH_SMTP_SENDER: noreply@localhost
      AUTH_LOG_LEVEL: warn
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:4000/healthz || exit 1']
      interval: 5s
      timeout: 5s
      retries: 72
      start_period: 15s
