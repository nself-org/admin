name: Docker — Build & Publish nself-admin

# Separate from release.yml — this workflow handles Docker Hub publish only
# Triggers on: release tag push OR manual dispatch

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag (without v prefix, e.g. 1.2.3)'
        required: true
        type: string

env:
  DOCKER_IMAGE: nself/nself-admin

jobs:
  docker-publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$(echo $VERSION | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo $VERSION | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          echo "Building nself-admin v$VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.major }}.${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest

      - name: Build Docker image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:scan-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      # S44.T01: Trivy container scan — CRITICAL fails the build, HIGH triggers warning
      - name: Trivy scan — SARIF upload (all severities)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:scan-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Trivy scan — CRITICAL gate (blocks push)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:scan-${{ github.sha }}
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

      # S49-T06: Verify the pushed image manifest contains BOTH linux/amd64 AND linux/arm64.
      # Uses `docker buildx imagetools inspect` (not grep on stdout) per CR-A checklist.
      # A single-arch push triggers a non-zero exit here and blocks the workflow.
      - name: Verify multi-arch manifest (S49-T06)
        run: |
          IMAGE="${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}"
          echo "Inspecting manifest: $IMAGE"

          PLATFORMS=$(docker buildx imagetools inspect "$IMAGE" \
            --format '{{range .Manifest.Manifests}}{{.Platform.OS}}/{{.Platform.Architecture}} {{end}}' \
            2>/dev/null || echo "")
          echo "Platforms in manifest: $PLATFORMS"

          if [ -z "$PLATFORMS" ]; then
            echo "FAIL: Could not inspect manifest for $IMAGE"
            echo "Ensure the image was pushed successfully before this step."
            exit 1
          fi

          # Assert linux/amd64 is present
          if ! echo "$PLATFORMS" | grep -q "linux/amd64"; then
            echo "FAIL: manifest missing linux/amd64 — got: $PLATFORMS"
            exit 1
          fi

          # Assert linux/arm64 is present
          if ! echo "$PLATFORMS" | grep -q "linux/arm64"; then
            echo "FAIL: manifest missing linux/arm64 — got: $PLATFORMS"
            echo "Single-arch image detected. Ensure build-push-action --platform includes arm64."
            exit 1
          fi

          echo "PASS: $IMAGE manifest contains linux/amd64 + linux/arm64"

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE }}
          readme-filepath: ./.github/wiki/DOCKER_README.md

      - name: Summary
        run: |
          echo "### nself-admin Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.DOCKER_IMAGE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Version: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tags: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install: \`docker pull ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
