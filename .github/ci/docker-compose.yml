# CI-only nself backend stack for admin E2E tests.
# Provides the postgres + hasura + auth services that admin API routes talk to.
# NOT generated by nself build — this is a standalone CI fixture.
# All secrets are dev-only values intentionally weak for CI isolation.

name: nself-admin-ci

networks:
  admin_network:
    name: admin_network
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - admin_network
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres-dev-password
      POSTGRES_DB: nself_admin_ci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  hasura:
    image: hasura/graphql-engine:v2.36.0
    restart: unless-stopped
    networks:
      - admin_network
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: 'false'
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup
      HASURA_GRAPHQL_LOG_LEVEL: warn

  auth:
    image: nhost/hasura-auth:latest
    restart: unless-stopped
    networks:
      - admin_network
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_HOST: '0.0.0.0'
      AUTH_PORT: '4000'
      HASURA_GRAPHQL_DATABASE_URL: postgresql://postgres:postgres-dev-password@postgres:5432/nself_admin_ci
      HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}'
      HASURA_GRAPHQL_GRAPHQL_URL: http://hasura:8080/v1/graphql
      AUTH_SERVER_URL: http://localhost:4000
      AUTH_CLIENT_URL: http://localhost:3021
      AUTH_ACCESS_TOKEN_EXPIRES_IN: '900'
      AUTH_REFRESH_TOKEN_EXPIRES_IN: '2592000'
      AUTH_EMAIL_SIGNIN_EMAIL_VERIFIED_REQUIRED: 'false'
      AUTH_DISABLE_NEW_USERS: 'false'
      AUTH_ANONYMOUS_USERS_ENABLED: 'false'
      AUTH_LOG_LEVEL: warn
