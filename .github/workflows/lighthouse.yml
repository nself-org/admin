name: Lighthouse Audit

on:
  schedule:
    # Run weekly on Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'

jobs:
  audit:
    name: Performance Audit
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Start application
        run: |
          pnpm start > /tmp/app.log 2>&1 &
          echo "APP_PID=$!" >> $GITHUB_ENV
          echo "Waiting for app to start (polling /login)..."
          # IMPORTANT: do NOT poll /api/health on CI.
          # The health endpoint runs docker/filesystem/nself-cli checks; on a bare
          # GitHub Actions runner those checks fail and the route correctly returns
          # HTTP 503, which `curl -sf` treats as failure and the wait loop
          # times out at 180s even though Next.js is fully ready ("Ready in 138ms").
          # We poll /login instead — a public route that returns 200/302/307 as
          # soon as Next.js is serving requests. -s (no -f) so any HTTP response
          # counts as success; only connection-refused (code 000) keeps us waiting.
          # 180s budget covers Next.js 16 + next-intl 4.9 cold-start (60-90s typical).
          DEADLINE=$((SECONDS + 180))
          until CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3021/login 2>/dev/null) && [ -n "$CODE" ] && [ "$CODE" != "000" ]; do
            if [ $SECONDS -ge $DEADLINE ]; then
              echo "ERROR: /login did not respond within 180s"
              echo "--- app log (last 100 lines) ---"
              tail -100 /tmp/app.log || true
              exit 1
            fi
            echo "  waiting on /login... ($SECONDS s elapsed)"
            sleep 3
          done
          echo "App is serving /login (HTTP $CODE) after ${SECONDS}s"

          # Pre-warm /login so the first JIT compile + dynamic import resolution
          # is done before Lighthouse opens Chrome. Without this, the first
          # navigation runs the Next.js compile path and NO_FCP can fire.
          echo "Pre-warming /login route..."
          WARM_DEADLINE=$((SECONDS + 120))
          until CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3021/login 2>/dev/null) && echo "$CODE" | grep -qE '^(200|302|307)$'; do
            if [ $SECONDS -ge $WARM_DEADLINE ]; then
              echo "ERROR: /login did not respond with 200/302/307 within 120s (last code: $CODE)"
              echo "--- app log (last 100 lines) ---"
              tail -100 /tmp/app.log || true
              exit 1
            fi
            echo "  warming /login... ($SECONDS s elapsed, last code: $CODE)"
            sleep 3
          done
          # Second warm pass to ensure cached compile output is stable.
          curl -s -o /dev/null http://localhost:3021/login || true
          curl -s -o /dev/null http://localhost:3021/login || true
          echo "/login warmed successfully (HTTP $CODE)"

      - name: Run Lighthouse audit
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: http://localhost:3021/login
          configPath: './.lighthouserc.json'
          uploadArtifacts: false
          temporaryPublicStorage: true
          runs: 3

      - name: Parse Lighthouse scores
        id: scores
        run: |
          # Scores are in .lighthouseci/lhr-*.json (treosh/lighthouse-ci-action output format)
          LHR=$(ls -t .lighthouseci/lhr-*.json 2>/dev/null | head -1)
          if [ -z "$LHR" ]; then
            echo "No Lighthouse results found"
            echo "performance=0" >> $GITHUB_OUTPUT
            echo "accessibility=0" >> $GITHUB_OUTPUT
            echo "bestPractices=0" >> $GITHUB_OUTPUT
            echo "seo=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          performance=$(jq -r '((.categories.performance.score // 0) * 100 | floor)' "$LHR" || echo "0")
          accessibility=$(jq -r '((.categories.accessibility.score // 0) * 100 | floor)' "$LHR" || echo "0")
          bestPractices=$(jq -r '((.categories["best-practices"].score // 0) * 100 | floor)' "$LHR" || echo "0")
          seo=$(jq -r '((.categories.seo.score // 0) * 100 | floor)' "$LHR" || echo "0")
          echo "performance=$performance" >> $GITHUB_OUTPUT
          echo "accessibility=$accessibility" >> $GITHUB_OUTPUT
          echo "bestPractices=$bestPractices" >> $GITHUB_OUTPUT
          echo "seo=$seo" >> $GITHUB_OUTPUT
          echo "Scores — Perf: $performance | A11y: $accessibility | Best: $bestPractices | SEO: $seo"

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const performance = ${{ steps.scores.outputs.performance }};
            const accessibility = ${{ steps.scores.outputs.accessibility }};
            const bestPractices = ${{ steps.scores.outputs.bestPractices }};
            const seo = ${{ steps.scores.outputs.seo }};

            const getEmoji = (score) => {
              if (score >= 90) return '🟢';
              if (score >= 50) return '🟠';
              return '🔴';
            };

            const body = `## Lighthouse Audit Results

            | Category | Score | Status |
            |----------|-------|--------|
            | Performance | ${performance} | ${getEmoji(performance)} |
            | Accessibility | ${accessibility} | ${getEmoji(accessibility)} |
            | Best Practices | ${bestPractices} | ${getEmoji(bestPractices)} |
            | SEO | ${seo} | ${getEmoji(seo)} |

            ### Score Guide
            - 🟢 90-100: Good
            - 🟠 50-89: Needs improvement
            - 🔴 0-49: Poor

            [View full Lighthouse report](${{ steps.lighthouse.outputs.links }})
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

      - name: Check performance threshold
        run: |
          SCORE="${{ steps.scores.outputs.performance }}"
          echo "Performance score: $SCORE"
          if [ -n "$SCORE" ] && [ "$SCORE" != "0" ] && [ "$SCORE" -lt 50 ] 2>/dev/null; then
            echo "::error::Performance score below 50: $SCORE"
            exit 1
          fi
