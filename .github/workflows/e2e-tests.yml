name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Build the production bundle once; all shards share it ──────────────────
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build

      - name: Upload .next build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

  # ── Desktop browsers: 3 browsers × 4 shards = 12 parallel jobs ────────────
  e2e-tests:
    name: E2E (${{ matrix.browser }}, shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: build
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download .next build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Create minimal nself project for CI
        run: |
          mkdir -p /tmp/nself-ci-project
          printf 'PROJECT_NAME=nself-admin-ci\n' > /tmp/nself-ci-project/.env.dev
          printf 'BASE_DOMAIN=localhost\n' >> /tmp/nself-ci-project/.env.dev
          printf 'HASURA_GRAPHQL_ADMIN_SECRET=hasura-admin-secret-ci-only-32chars\n' >> /tmp/nself-ci-project/.env.dev
          printf 'DOCKER_NETWORK=admin_network\n' >> /tmp/nself-ci-project/.env.dev
          printf 'HASURA_GRAPHQL_JWT_SECRET={"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}\n' >> /tmp/nself-ci-project/.env.dev
          cp /tmp/nself-ci-project/.env.dev /tmp/nself-ci-project/.env

      - name: Start nself backend stack
        run: |
          docker compose -f .github/ci/docker-compose.yml pull --quiet
          docker compose -f .github/ci/docker-compose.yml up -d
        working-directory: .

      - name: Wait for Hasura health
        run: |
          echo "Waiting for Hasura at http://localhost:8080/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Hasura healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Hasura did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Wait for Auth service health
        run: |
          echo "Waiting for Auth at http://localhost:4000/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "Auth healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Auth service did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Seed E2E test users
        run: |
          AUTH_URL="http://localhost:4000"
          PASSWORD="password123"
          seed_user() {
            local email="$1"
            local display="$2"
            local role="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$AUTH_URL/v1/signup/email-password" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$email\",\"password\":\"$PASSWORD\",\"options\":{\"displayName\":\"$display\",\"locale\":\"en\",\"metadata\":{\"role\":\"$role\"}}}")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "Created: $email"
            elif [ "$http_code" = "409" ] || [ "$http_code" = "422" ]; then
              echo "Already exists (ok): $email"
            else
              echo "WARNING: unexpected HTTP $http_code for $email"
            fi
          }
          seed_user "owner@nself.org"     "Test Owner"     "owner"
          seed_user "admin@nself.org"     "Test Admin"     "admin"
          seed_user "moderator@nself.org" "Test Moderator" "moderator"
          seed_user "member@nself.org"    "Test Member"    "member"
          seed_user "guest@nself.org"     "Test Guest"     "guest"
          echo "Seeding complete."
        working-directory: .

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          pnpm test:e2e \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          WARMUP_BROWSER: ${{ matrix.browser }}
          # Bypass the 10 req/min rate-limit on /api/auth/login so the full
          # matrix (3 browsers × 4 shards + retries) can authenticate without
          # exhausting the shared 'unknown' IP bucket.  Has no effect in prod.
          PLAYWRIGHT_E2E_BYPASS_RATE_LIMIT: 'true'
          # CI nself backend — points to the synthetic project directory created above.
          # getProjectPath() reads this so all path-based API routes resolve correctly.
          NSELF_PROJECT_PATH: /tmp/nself-ci-project
          # Hasura admin secret for the CI stack.  Empty string would also be
          # safe (guard only fires on non-empty dev-stub values), but setting the
          # real CI value allows any non-mocked Hasura proxy calls to succeed.
          HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.browser }}-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

  # ── Mobile viewports: 2 shards ─────────────────────────────────────────────
  mobile-tests:
    name: Mobile E2E (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: build
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download .next build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next/

      - name: Create minimal nself project for CI
        run: |
          mkdir -p /tmp/nself-ci-project
          printf 'PROJECT_NAME=nself-admin-ci\n' > /tmp/nself-ci-project/.env.dev
          printf 'BASE_DOMAIN=localhost\n' >> /tmp/nself-ci-project/.env.dev
          printf 'HASURA_GRAPHQL_ADMIN_SECRET=hasura-admin-secret-ci-only-32chars\n' >> /tmp/nself-ci-project/.env.dev
          printf 'DOCKER_NETWORK=admin_network\n' >> /tmp/nself-ci-project/.env.dev
          printf 'HASURA_GRAPHQL_JWT_SECRET={"type":"HS256","key":"admin-ci-development-secret-key-minimum-32-characters"}\n' >> /tmp/nself-ci-project/.env.dev
          cp /tmp/nself-ci-project/.env.dev /tmp/nself-ci-project/.env

      - name: Start nself backend stack
        run: |
          docker compose -f .github/ci/docker-compose.yml pull --quiet
          docker compose -f .github/ci/docker-compose.yml up -d
        working-directory: .

      - name: Wait for Hasura health
        run: |
          echo "Waiting for Hasura at http://localhost:8080/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:8080/healthz > /dev/null 2>&1; then
              echo "Hasura healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Hasura did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Wait for Auth service health
        run: |
          echo "Waiting for Auth at http://localhost:4000/healthz ..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "Auth healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/24 — waiting 5 s ..."
            sleep 5
          done
          echo "ERROR: Auth service did not become healthy within 120 s" >&2
          exit 1
        working-directory: .

      - name: Seed E2E test users
        run: |
          AUTH_URL="http://localhost:4000"
          PASSWORD="password123"
          seed_user() {
            local email="$1"
            local display="$2"
            local role="$3"
            local http_code
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$AUTH_URL/v1/signup/email-password" \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"$email\",\"password\":\"$PASSWORD\",\"options\":{\"displayName\":\"$display\",\"locale\":\"en\",\"metadata\":{\"role\":\"$role\"}}}")
            if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
              echo "Created: $email"
            elif [ "$http_code" = "409" ] || [ "$http_code" = "422" ]; then
              echo "Already exists (ok): $email"
            else
              echo "WARNING: unexpected HTTP $http_code for $email"
            fi
          }
          seed_user "owner@nself.org"     "Test Owner"     "owner"
          seed_user "admin@nself.org"     "Test Admin"     "admin"
          seed_user "moderator@nself.org" "Test Moderator" "moderator"
          seed_user "member@nself.org"    "Test Member"    "member"
          seed_user "guest@nself.org"     "Test Guest"     "guest"
          echo "Seeding complete."
        working-directory: .

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Mobile E2E tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: |
          pnpm test:e2e:mobile \
            --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          WARMUP_BROWSER: chromium
          # Bypass the 10 req/min rate-limit on /api/auth/login for the same
          # reason as the desktop shards — mobile shards share the same server.
          PLAYWRIGHT_E2E_BYPASS_RATE_LIMIT: 'true'
          # CI nself backend — points to the synthetic project directory created above.
          NSELF_PROJECT_PATH: /tmp/nself-ci-project
          HASURA_GRAPHQL_ADMIN_SECRET: hasura-admin-secret-ci-only-32chars

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-mobile-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 7

  # ── Merge all shard reports + aggregate pass/fail gate ─────────────────────
  summary:
    name: Test Summary
    needs: [e2e-tests, mobile-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (for merge-reports)
        run: pnpm exec playwright install --with-deps chromium

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge shard reports into HTML report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 30

      - name: Write step summary
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Desktop Browsers (4 shards each)" >> $GITHUB_STEP_SUMMARY
          echo "- Chromium: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Firefox:  ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- WebKit:   ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Mobile (2 shards)" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile Chrome + Safari: ${{ needs.mobile-tests.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any shard failed
        if: >
          needs.e2e-tests.result == 'failure' ||
          needs.e2e-tests.result == 'cancelled' ||
          needs.mobile-tests.result == 'failure' ||
          needs.mobile-tests.result == 'cancelled'
        run: |
          echo "One or more E2E shards failed or were cancelled."
          exit 1
